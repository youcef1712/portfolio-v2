services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: mon-portfolio-app:1.0
    container_name: mon-portfolio-container
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s